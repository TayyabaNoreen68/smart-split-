<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMR Calculator</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb, #fad0c4);
}
.container {
  width: 90%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.9);
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  backdrop-filter: blur(6px);
}
h2 {
  color: #6a11cb;
  margin-bottom: 15px;
}
.field-group {
  text-align: left;
  margin: 10px 0;
}
label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  color: #4e0ea3;
  margin-bottom: 4px;
}
input, select, button {
  width: 100%;
  padding: 12px;
  margin: 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  box-sizing: border-box;
}
button {
  background: #6a11cb;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}
button:hover {
  background: #4e0ea3;
}
.result {
  margin-top: 15px;
  padding: 12px;
  background: #e9ffe9;
  border-radius: 10px;
  text-align: left;
}
.error {
  margin-top: 12px;
  padding: 12px;
  background: #ffe5e5;
  border: 1px solid #ff4d4f;
  color: #b00020;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: left;
  display: none;
}
</style>
</head>
<body>
<div class="container">
  <h2>✨ Calories Calculator</h2>

  <div class="field-group">
    <label for="gender">Gender</label>
    <select id="gender">
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>

  <div class="field-group">
    <label for="height">Height (cm)</label>
    <input type="text" id="height" placeholder="e.g. 170">
  </div>

  <div class="field-group">
    <label for="weight">Weight (kg)</label>
    <input type="text" id="weight" placeholder="e.g. 65">
  </div>

  <div class="field-group">
    <label for="age">Age (years)</label>
    <input type="text" id="age" placeholder="e.g. 25">
  </div>

  <div class="field-group">
    <label for="activity">Activity Level</label>
    <select id="activity">
      <option value="">Select Activity Level</option>
      <option value="1.2">Little to no exercise</option>
      <option value="1.375">Exercising 1–3 times/week</option>
      <option value="1.55">Exercising 3–5 times/week</option>
      <option value="1.725">Exercising 6–7 times/week</option>
      <option value="1.9">Exercising twice a day</option>
    </select>
  </div>

  <div class="field-group">
    <label for="goal">Calorie Goal</label>
    <select id="goal">
      <option value="">Select Calorie Goal</option>
      <option value="maintain">Maintain weight</option>
      <option value="lose05">Lose 0.5 lb/week</option>
      <option value="lose1">Lose 1 lb/week</option>
      <option value="lose15">Lose 1.5 lbs/week</option>
      <option value="lose2">Lose 2 lbs/week</option>
      <option value="gainSlow">Slow muscle gain</option>
      <option value="gainStandard">Standard muscle gain</option>
      <option value="gainFast">Fast muscle gain</option>
    </select>
  </div>

  <button onclick="calculate()">Calculate</button>
  <button onclick="resetForm()">Reset</button>

  <div id="error" class="error"></div>
  <div id="result" class="result"></div>
</div>

<script>
function calculate() {
  let gender = document.getElementById("gender").value;
  let height = document.getElementById("height").value;
  let weight = document.getElementById("weight").value;
  let age = document.getElementById("age").value;
  let activity = parseFloat(document.getElementById("activity").value);
  let goal = document.getElementById("goal").value;
  let error = document.getElementById("error");
  let result = document.getElementById("result");

  error.innerHTML = "";
  error.style.display = "none";
  result.innerHTML = "";

  if (!gender || !activity || !goal) {
    error.innerHTML = "❌ Please complete all required fields.";
    error.style.display = "block";
    return;
  }

  // Only digits, optional single decimal point for height/weight — no symbols, letters, or negative signs
  const decimalPattern = /^[0-9]+(\.[0-9]+)?$/;
  if (
    !decimalPattern.test(height.trim()) ||
    !decimalPattern.test(weight.trim()) ||
    !decimalPattern.test(age.trim())
  ) {
    error.innerHTML = "❌ Please enter valid numbers for height, weight, and age.";
    error.style.display = "block";
    return;
  }

  height = parseFloat(height);
  weight = parseFloat(weight);
  age = parseFloat(age);

 
  let bmr;

  if (gender === "male") {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }

  let tdee = bmr * activity;
  let goalCalories = tdee;

  switch (goal) {
    case "maintain":
      goalCalories = tdee;
      break;
    case "lose05":
      goalCalories = tdee - 250;
      break;
    case "lose1":
      goalCalories = tdee - 500;
      break;
    case "lose15":
      goalCalories = tdee - 750;
      break;
    case "lose2":
      goalCalories = tdee - 1000;
      break;
    case "gainSlow":
      goalCalories = tdee + 250;
      break;
    case "gainStandard":
      goalCalories = tdee + 500;
      break;
    case "gainFast":
      goalCalories = tdee + 750;
      break;
  }

  let protein = weight * 2;
  let fat = weight * 0.8;
  let carbs = (goalCalories - (protein * 4 + fat * 9)) / 4;

  result.innerHTML = `
    🔥 BMR: ${bmr.toFixed(0)} kcal <br>
    ⚡ TDEE (Maintenance Calories): ${tdee.toFixed(0)} kcal <br>
    🎯 Goal Calories: ${goalCalories.toFixed(0)} kcal <br><br>
    🥩 Protein: ${protein.toFixed(0)} g <br>
    🍚 Carbs: ${carbs.toFixed(0)} g <br>
    🧈 Fat: ${fat.toFixed(0)} g
  `;
}

function resetForm() {
  document.querySelectorAll("input, select").forEach(el => el.value = "");
  document.getElementById("result").innerHTML = "";
  document.getElementById("error").style.display = "none";
}
</script>
</body>
</html>
