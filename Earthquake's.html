<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earthquake's History</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root
{
--bg:#0b1220;
--card:#111a2e;
--accent:#6d5efc;
--text:#e6edf7;
--muted:#9aa7bd;
--line:#1f2a44;
}

*
{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body
{
background:var(--bg);
color:var(--text);
padding:20px;
}

h1
{
text-align:center;
color:var(--accent);
margin-bottom:20px;
}

.container
{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

.card
{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--line);
}

.grid
{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
label
{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:bold;
color:var(--text);
}
input
{
padding:10px;
border-radius:8px;
border:1px solid var(--line);
background:#0e1628;
color:white;
width:100%;
}

input::placeholder
{
color:#9aa7bd;
opacity:1;
}

label
{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:bold;
color:white;
}
button
{
padding:10px;
background:var(--accent);
border:none;
color:white;
cursor:pointer;
border-radius:8px;
margin-top:10px;
}

a
{
color:#6d5efc;
font-weight:bold;
text-decoration:none;
}

a:hover
{
text-decoration:underline;
}

table
{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td
{
border:1px solid var(--line);
padding:8px;
text-align:center;
font-size:14px;
}

th
{
background:var(--accent);
color:white;
}

.loading
{
text-align:center;
color:var(--muted);
}
.resultSection
{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
align-items:start;
margin-top:20px;
}

.tableBox
{
overflow-x:auto;
}

.chartBox
{
background:var(--card);
padding:15px;
border:1px solid var(--line);
border-radius:12px;
text-align:center;
}

.chartBox canvas
{
margin-top:15px;
max-width:100%;
}

</style>

</head>

<body>

<h1>Earthquake's History</h1>

<div class="card">
<div class="grid">

<div>
<label for="startDate">Start Date:</label>
<input type="date" id="startDate">
</div>

<div>
<label for="endDate">End Date:</label>
<input type="date" id="endDate">
</div>

<div>
<label for="minMag">Minimum Magnitude:</label>
<input type="number" id="minMag" placeholder="e.g., 2.5">
</div>

<div>
<label for="maxMag">Maximum Magnitude:</label>
<input type="number" id="maxMag" placeholder="e.g., 7.0">
</div>

<div>
<label for="minDepth">Minimum Depth (km):</label>
<input type="number" id="minDepth" placeholder="e.g., 0">
</div>

<div>
<label for="maxDepth">Maximum Depth (km):</label>
<input type="number" id="maxDepth" placeholder="e.g., 700">
</div>

<div>
<label for="limit">Limit:</label>
<input type="number" id="limit" placeholder="50">
</div>

</div>
</div>
</div>

</div>

<button id="searchBtn">Search Earthquakes</button>


<div class="loading" id="status"></div>
<div class="resultSection">

<div class="tableBox">

<table>

<thead>
<tr>
<th>Date</th>
<th>Location</th>
<th>Magnitude</th>
<th>Depth</th>
<th>Details</th>
</tr>

</thead>

<tbody id="results"></tbody>

</table>

</div>

<div class="chartBox">

<button id="histogramBtn">
View Earthquake History
</button>

<canvas id="histogramChart"></canvas>

</div>

</div>
</div>

<script>

let earthquakeData = []
let earthquakeMagnitudes = []
let histogramChart = null

document.getElementById("searchBtn").addEventListener("click", fetchData)

async function fetchData()
{

let status = document.getElementById("status")
status.innerText = "Searching..."
let start = document.getElementById("startDate").value
let end = document.getElementById("endDate").value
let limit = document.getElementById("limit").value || 50

if(start==="" || end==="")
{
status.innerText="Please select both Start Date and End Date."
return
}

let minMag=document.getElementById("minMag").value
let maxMag=document.getElementById("maxMag").value
let minDepth=document.getElementById("minDepth").value
let maxDepth=document.getElementById("maxDepth").value

if(
start==="" ||
end==="" ||
minMag==="" ||
maxMag==="" ||
minDepth==="" ||
maxDepth==="" ||
limit===""
)
{
status.innerText="Please fulfill all requirements before searching."
return
}
let url=`https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=${start}&endtime=${end}&limit=${limit}`

if(minMag!=="") url+=`&minmagnitude=${minMag}`
if(maxMag!=="") url+=`&maxmagnitude=${maxMag}`
if(minDepth!=="") url+=`&mindepth=${minDepth}`
if(maxDepth!=="") url+=`&maxdepth=${maxDepth}`
try
{

let res = await fetch(url)
let data = await res.json()
earthquakeData = data.features || []

if(earthquakeData.length===0)
{
status.innerText="No earthquake records found."
document.getElementById("results").innerHTML=""
return
}

renderTable()

status.innerText=`${earthquakeData.length} earthquake(s) found.`

}

catch(err)
{
status.innerText = "Error loading data"
}

}

function renderTable()
{

let tbody = document.getElementById("results")
tbody.innerHTML = ""

earthquakeMagnitudes = []

earthquakeData.forEach(eq =>
{

let mag = eq.properties.mag || 0
let place = eq.properties.place
let time = new Date(eq.properties.time).toLocaleString()
let depth = eq.geometry.coordinates[2]
let detailsUrl = eq.properties.url

earthquakeMagnitudes.push(mag)

let row =
`
<tr>
<td>${time}</td>
<td>${place}</td>
<td>${mag}</td>
<td>${depth}</td>
<td>
<a href="${detailsUrl}" target="_blank">
Details
</a>
</td>
</tr>
`

tbody.innerHTML += row

})

}

document.getElementById("histogramBtn").addEventListener("click", function ()
{

if (!earthquakeMagnitudes.length)
{
alert("No data available")
return
}

let min = Math.floor(Math.min(...earthquakeMagnitudes))
let max = Math.ceil(Math.max(...earthquakeMagnitudes))

let binWidth = 0.5

let bins = []
let labels = []

for (let i = min; i < max; i += binWidth)
{
bins.push(0)

labels.push(`${i.toFixed(1)} - ${(i + binWidth).toFixed(1)}`)
}

earthquakeMagnitudes.forEach(val =>
{

let index = Math.floor((val - min) / binWidth)

if (index >= 0 && index < bins.length)
{
bins[index]++
}

})

if (histogramChart !== null)
{
histogramChart.destroy()
}

let ctx = document.getElementById("histogramChart").getContext("2d")

histogramChart = new Chart(ctx,
{
type:"bar",

data:
{
labels:labels,
datasets:
[
{
label:"Earthquake Magnitude Distribution",
data:bins,
backgroundColor:"#6d5efc"
}
]
},

options:
{
responsive:true,

scales:
{
y:
{
beginAtZero:true
}
}
}

})

})

</script>

</body>

</html>
