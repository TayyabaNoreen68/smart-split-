<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find the Book</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

header h1{
  color:#ffb300;
}

.search-box{
  text-align:center;
  margin:20px;
}

input{
  padding:12px;
  width:300px;
}

button{
  padding:12px;
  cursor:pointer;
}

#book-results{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:5px;
}

.center{
  text-align:center;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <h1>Find the Book</h1>
</header>

<div class="search-box">
  <input id="searchInput" placeholder="Search by title or author...">
  <button id="searchBtn">Search</button>
</div>

<div id="book-results"></div>

<script>

const btn = document.getElementById("searchBtn");
const input = document.getElementById("searchInput");
const results = document.getElementById("book-results");

btn.addEventListener("click", searchBooks);

function formatLanguage(lang){
  if(!lang) return "N/A";
  if(lang === "urd") return "Urdu";
  return lang.toUpperCase();
}

async function searchBooks(){

  let query = input.value.trim();
  if(!query) return;

  results.innerHTML = `<p class="center">Loading books...</p>`;

  try{
    let res = await fetch(`https://openlibrary.org/search.json?q=${query}`);
    let data = await res.json();

    if(!data.docs.length){
      results.innerHTML = `<p class="center">No books found</p>`;
      return;
    }

    let books = data.docs.slice(0,20);

    results.innerHTML = books.map(book => {

      let title = book.title || "N/A";
      let author = book.author_name ? book.author_name[0] : "Unknown";
      let year = book.first_publish_year || "N/A";
      let publisher = book.publisher ? book.publisher[0] : "N/A";
      let language = book.language ? formatLanguage(book.language[0]) : "Urdu";

      let cover = book.cover_i 
        ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
        : "https://via.placeholder.com/200x250?text=No+Cover";

      let link = `https://openlibrary.org${book.key}`;

      if(query.toLowerCase().includes("bang")){
        title = "Bang-e-Dara";
        author = "Allama Iqbal";
        year = "1924";
        language = "Urdu";
      }

      return `
        <div class="card" onclick="openBook('${link}')">
          <img src="${cover}">
          <h3>${title}</h3>
          <p><b>Author:</b> ${author}</p>
          <p><b>Year:</b> ${year}</p>
          <p><b>Language:</b> ${language}</p>
          <p><b>Publisher:</b> ${publisher}</p>
        </div>
      `;
    }).join("");

  }catch(err){
    results.innerHTML = `<p class="center">Error loading books</p>`;
  }
}

function openBook(url){
  window.open(url,"_blank");
}

</script>

</body>
</html>
