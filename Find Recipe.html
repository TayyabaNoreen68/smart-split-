<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Box — Find What's Cooking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#22303f;
    --card:#fbf6ec;
    --card-line:#d8cdb2;
    --ribbon:#c1443c;
    --saffron:#e0a238;
    --saffron-dark:#b97e22;
    --paper:#efe6d2;
    --muted:#6b7a89;
    --white:#ffffff;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(34,48,63,0.06) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  .site-header{
    text-align:center;
    padding:38px 20px 24px;
  }
  .site-header .eyebrow{
    font-family:'Courier Prime', monospace;
    letter-spacing:3px;
    font-size:12px;
    color:var(--saffron-dark);
    text-transform:uppercase;
  }
  .site-header h1{
    font-family:'Playfair Display', serif;
    font-size:44px;
    margin:6px 0 4px;
    font-weight:800;
  }
  .site-header p{
    color:var(--muted);
    margin:0;
    font-size:15px;
  }

  .container{
    max-width:960px;
    margin:0 auto;
    padding:0 20px 60px;
  }

  /* Search section */
  .search-panel{
    background:var(--white);
    border:1px solid var(--card-line);
    border-radius:14px;
    padding:22px;
    box-shadow:0 4px 18px rgba(34,48,63,0.06);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .search-panel input[type="text"]{
    flex:1 1 220px;
    padding:13px 16px;
    border-radius:10px;
    border:1.5px solid var(--card-line);
    font-size:15px;
    font-family:'Inter',sans-serif;
    outline:none;
    transition:border-color .15s ease;
  }
  .search-panel input[type="text"]:focus{
    border-color:var(--saffron);
  }
  .btn{
    border:none;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-weight:600;
    border-radius:10px;
    padding:13px 22px;
    font-size:14px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn-primary{
    background:var(--saffron);
    color:#2b1c00;
  }
  .btn-primary:hover{ box-shadow:0 6px 14px rgba(224,162,56,0.4); }
  .btn-secondary{
    background:var(--ink);
    color:var(--white);
  }
  .btn-secondary:hover{ box-shadow:0 6px 14px rgba(34,48,63,0.3); }

  .today-row{
    text-align:center;
    margin:26px 0;
  }

  /* Section headers */
  .section-label{
    font-family:'Courier Prime', monospace;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin:34px 0 12px;
  }

  /* Search results list */
  .results-box{
    background:var(--white);
    border:1px solid var(--card-line);
    border-radius:14px;
    padding:10px;
    box-shadow:0 4px 18px rgba(34,48,63,0.06);
  }
  .result-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    transition:background .12s ease;
  }
  .result-item:hover{
    background:var(--paper);
  }
  .result-item img{
    width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;
  }
  .result-item span{
    font-weight:600;
    font-size:15px;
  }
  .empty-msg{
    text-align:center;
    padding:26px;
    color:var(--muted);
    font-size:14px;
  }

  /* Random recipe grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:18px;
  }

  .flip-card{
    perspective:1000px;
    height:230px;
  }
  .flip-inner{
    position:relative;
    width:100%;height:100%;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .flip-card.flipped .flip-inner{
    transform:rotateY(180deg);
  }
  .flip-front, .flip-back{
    position:absolute;
    inset:0;
    border-radius:14px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
    text-align:center;
  }
  .flip-front{
    background:var(--card);
    border:1.5px dashed var(--card-line);
    cursor:pointer;
  }
  .flip-front::before{
    content:"";
    position:absolute;
    top:0; left:16px;
    width:26px; height:38px;
    background:var(--ribbon);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
  }
  .flip-front .cat-label{
    font-family:'Courier Prime', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .flip-front .cat-name{
    font-family:'Playfair Display', serif;
    font-size:22px;
    font-weight:700;
  }
  .flip-front .tap-hint{
    margin-top:12px;
    font-size:11px;
    color:var(--saffron-dark);
  }

  .flip-back{
    background:var(--white);
    border:1px solid var(--card-line);
    transform:rotateY(180deg);
    box-shadow:0 4px 14px rgba(34,48,63,0.08);
  }
  .flip-back img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:8px;
  }
  .flip-back .r-name{
    font-weight:600;
    font-size:14px;
    margin-bottom:10px;
    line-height:1.3;
  }
  .flip-back button{
    font-size:12px;
    padding:8px 14px;
  }

  /* Recipe detail view */
  .detail-card{
    background:var(--white);
    border:1px solid var(--card-line);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 22px rgba(34,48,63,0.08);
  }
  .detail-card img{
    width:100%;
    max-height:320px;
    object-fit:cover;
    display:block;
  }
  .detail-body{
    padding:26px;
  }
  .detail-body h2{
    font-family:'Playfair Display', serif;
    font-size:30px;
    margin:0 0 8px;
  }
  .tags{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .tag{
    font-family:'Courier Prime', monospace;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    background:var(--paper);
    border:1px solid var(--card-line);
    padding:5px 10px;
    border-radius:20px;
    color:var(--muted);
  }
  .detail-body h3{
    font-family:'Playfair Display', serif;
    font-size:18px;
    margin:22px 0 10px;
    border-bottom:2px solid var(--saffron);
    display:inline-block;
    padding-bottom:3px;
  }
  .ingredients-list{
    list-style:none;
    padding:0;
    margin:0;
    columns:2;
    column-gap:24px;
  }
  .ingredients-list li{
    font-size:14px;
    padding:5px 0;
    break-inside:avoid;
  }
  .ingredients-list li::before{
    content:"— ";
    color:var(--saffron-dark);
    font-weight:700;
  }
  .instructions{
    font-size:14.5px;
    line-height:1.7;
    color:#3a4855;
    white-space:pre-line;
  }
  .back-row{
    margin-top:24px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .loading, .error-msg{
    text-align:center;
    padding:30px;
    color:var(--muted);
    font-size:14px;
  }
  .error-msg{ color:var(--ribbon); }

  .hidden{ display:none !important; }

  @media (max-width:600px){
    .site-header h1{ font-size:32px; }
    .ingredients-list{ columns:1; }
  }
</style>
</head>
<body>

<div class="site-header">
  <div class="eyebrow">Recipe Box</div>
  <h1>What's Cooking Today?</h1>
  <p>Search any dish, or let us pick a surprise for you.</p>
</div>

<div class="container">

  <!-- 1. SEARCH SECTION -->
  <div class="search-panel">
    <input type="text" id="searchInput" placeholder="Search for a recipe name...">
    <button class="btn btn-primary" id="searchBtn">Search</button>
  </div>

  <div class="today-row">
    <button class="btn btn-secondary" id="todayBtn">🎲 Find Recipe For Today</button>
  </div>

  <!-- 2. SEARCH RESULTS -->
  <div id="searchResultsSection" class="hidden">
    <div class="section-label">Search Results</div>
    <div id="searchResultsBox" class="results-box"></div>
  </div>

  <!-- 4/5. RANDOM RECIPE FLIP CARDS -->
  <div id="randomSection" class="hidden">
    <div class="section-label">Recipes For Today</div>
    <div id="randomGrid" class="grid"></div>
    <div class="today-row">
      <button class="btn btn-secondary hidden" id="rerollBtn">🔁 Reroll Cards</button>
    </div>
  </div>

  <!-- 3/6. FULL RECIPE DETAIL -->
  <div id="detailSection" class="hidden">
    <div class="section-label">Full Recipe</div>
    <div id="detailBox"></div>
  </div>

  <div id="statusBox"></div>

</div>

<script>
/* ============================================================
   RECIPE BOX — powered by TheMealDB (free public API, no key)
   Base URL: https://www.themealdb.com/api/json/v1/1/
   ============================================================ */

const API_BASE = "https://www.themealdb.com/api/json/v1/1";

// Track which flip-card is currently open, so only one flips at a time
let currentFlippedCard = null;
// Remember the last set of random recipes, so "View Full Recipe" -> back
// can return to the same random grid (not just search results)
let lastRandomRecipes = [];
let cameFromRandom = false;

// ---- Element references ----
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const todayBtn = document.getElementById("todayBtn");
const rerollBtn = document.getElementById("rerollBtn");

const searchResultsSection = document.getElementById("searchResultsSection");
const searchResultsBox = document.getElementById("searchResultsBox");

const randomSection = document.getElementById("randomSection");
const randomGrid = document.getElementById("randomGrid");

const detailSection = document.getElementById("detailSection");
const detailBox = document.getElementById("detailBox");

const statusBox = document.getElementById("statusBox");

// ---- Helper: show a temporary status message (loading / error) ----
function showStatus(message, isError = false) {
  statusBox.innerHTML = `<div class="${isError ? 'error-msg' : 'loading'}">${message}</div>`;
}
function clearStatus() {
  statusBox.innerHTML = "";
}

// ---- Helper: hide all main sections before showing one ----
function hideAllSections() {
  searchResultsSection.classList.add("hidden");
  randomSection.classList.add("hidden");
  detailSection.classList.add("hidden");
}

/* ============================================================
   1. SEARCH RECIPE BY NAME
   ============================================================ */
async function searchRecipes() {
const query = searchInput.value.trim();

if (query === "") {
  searchInput.style.border = "2px solid red";
  showStatus("Please enter a recipe name.", true);
  searchInput.focus();
  return;
}

searchInput.style.border = "";

searchInput.style.border = "";

  cameFromRandom = false;
  hideAllSections();
  showStatus("Searching recipes...");

  try {
    const res = await fetch(`${API_BASE}/search.php?s=${encodeURIComponent(query)}`);
    const data = await res.json();
    clearStatus();

    searchResultsSection.classList.remove("hidden");

    if (!data.meals) {
      // No recipe found for this search term
      searchResultsBox.innerHTML = `<div class="empty-msg">No recipes found for "${query}". Try a different name.</div>`;
      return;
    }

    // Build the results list dynamically
    searchResultsBox.innerHTML = "";
    data.meals.forEach(meal => {
      const item = document.createElement("div");
      item.className = "result-item";
      item.innerHTML = `
        <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
        <span>${meal.strMeal}</span>
      `;
      // Clicking a result opens its full recipe detail
      item.addEventListener("click", () => showRecipeDetail(meal.idMeal));
      searchResultsBox.appendChild(item);
    });
    searchInput.value = "";
  } catch (err) {
    clearStatus();
    showStatus("Something went wrong while searching. Please try again.", true);
  }
}

/* ============================================================
   4. RANDOM RECIPE FEATURE — load 4 random recipes
   TheMealDB's random.php gives ONE recipe per call,
   so we call it 4 times in parallel.
   ============================================================ */
async function loadRandomRecipes() {
  cameFromRandom = true;
  hideAllSections();
  showStatus("Picking 4 surprises for you...");

  try {
    const calls = [1, 2, 3, 4].map(() => fetch(`${API_BASE}/random.php`).then(r => r.json()));
    const results = await Promise.all(calls);
    const meals = results.map(r => r.meals[0]);

    lastRandomRecipes = meals;
    clearStatus();
    renderRandomGrid(meals);

    randomSection.classList.remove("hidden");
    rerollBtn.classList.remove("hidden");

  } catch (err) {
    clearStatus();
    showStatus("Could not load random recipes. Please try again.", true);
  }
}

/* ============================================================
   5. FLIP CARDS — render the 4 random recipes as flip cards
   Front = Category, Back = Image + Name + View Full Recipe button
   ============================================================ */
function renderRandomGrid(meals) {
  randomGrid.innerHTML = "";
  currentFlippedCard = null;

  meals.forEach(meal => {
    const card = document.createElement("div");
    card.className = "flip-card";

    card.innerHTML = `
      <div class="flip-inner">
        <div class="flip-front">
          <div class="cat-label">Category</div>
          <div class="cat-name">${meal.strCategory}</div>
          <div class="tap-hint">Tap to reveal</div>
        </div>
        <div class="flip-back">
          <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
          <div class="r-name">${meal.strMeal}</div>
          <button class="btn btn-primary view-full-btn" data-id="${meal.idMeal}">View Full Recipe</button>
        </div>
      </div>
    `;

    const front = card.querySelector(".flip-front");
    // Only ONE card can be flipped at a time
    front.addEventListener("click", () => {
      if (currentFlippedCard && currentFlippedCard !== card) {
        currentFlippedCard.classList.remove("flipped");
      }
      card.classList.add("flipped");
      currentFlippedCard = card;
    });

    // "View Full Recipe" button on the back of the card
    const viewBtn = card.querySelector(".view-full-btn");
    viewBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      showRecipeDetail(viewBtn.dataset.id);
    });

    randomGrid.appendChild(card);
  });
}

/* ============================================================
   3 & 6. VIEW FULL RECIPE — fetch complete detail by id
   ============================================================ */
async function showRecipeDetail(id) {
  hideAllSections();
  showStatus("Loading recipe...");

  try {
    const res = await fetch(`${API_BASE}/lookup.php?i=${id}`);
    const data = await res.json();
    clearStatus();

    if (!data.meals) {
      showStatus("Recipe details not found.", true);
      return;
    }

    const meal = data.meals[0];

    // Ingredients + measures are stored as strIngredient1..20 / strMeasure1..20
    // Loop through all 20 and only keep the ones that are filled in
    let ingredientsHTML = "";
    for (let i = 1; i <= 20; i++) {
      const ingredient = meal[`strIngredient${i}`];
      const measure = meal[`strMeasure${i}`];
      if (ingredient && ingredient.trim() !== "") {
        ingredientsHTML += `<li>${measure ? measure.trim() : ""} ${ingredient.trim()}</li>`;
      }
    }

    detailBox.innerHTML = `
      <div class="detail-card">
        <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
        <div class="detail-body">
          <h2>${meal.strMeal}</h2>
          <div class="tags">
            <span class="tag">${meal.strCategory}</span>
            <span class="tag">${meal.strArea}</span>
          </div>

          <h3>Ingredients</h3>
          <ul class="ingredients-list">${ingredientsHTML}</ul>

          <h3>Instructions</h3>
          <p class="instructions">${meal.strInstructions}</p>

          <div class="back-row">
            <button class="btn btn-secondary" id="backBtn">← Back to Results</button>
            ${cameFromRandom ? '<button class="btn btn-primary" id="rerollFromDetailBtn">🔁 Reroll Cards</button>' : ''}
          </div>
        </div>
      </div>
    `;

    detailSection.classList.remove("hidden");

    // Back button: return to whichever list the user came from
    document.getElementById("backBtn").addEventListener("click", goBackToList);

    // Reroll button (only present when it was opened from random recipes)
    const rerollFromDetail = document.getElementById("rerollFromDetailBtn");
    if (rerollFromDetail) {
      rerollFromDetail.addEventListener("click", loadRandomRecipes);
    }

  } catch (err) {
    clearStatus();
    showStatus("Could not load recipe details. Please try again.", true);
  }
}

// ---- Go back to search results OR random grid, depending on origin ----
function goBackToList() {
  hideAllSections();
  if (cameFromRandom) {
    randomSection.classList.remove("hidden");
  } else {
    searchResultsSection.classList.remove("hidden");
  }
}

/* ============================================================
   7. REROLL CARDS — load 4 brand new random recipes
   (same function as loadRandomRecipes, just called again)
   ============================================================ */
rerollBtn.addEventListener("click", loadRandomRecipes);

/* ============================================================
   EVENT LISTENERS
   ============================================================ */
searchBtn.addEventListener("click", searchRecipes);
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") searchRecipes();
});
todayBtn.addEventListener("click", loadRandomRecipes);

</script>
</body>
</html>
