<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silhouettes & Stats</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#F5F5F5;
}

.title{
text-align:center;
font-family:cursive;
padding:10px;
}

.tabs{
display:flex;
justify-content:center;
background:#4A4A4A;
}

.tab{
background:none;
border:none;
color:white;
padding:15px 25px;
cursor:pointer;
}

.tab.active{
color:#00BFFF;
}

.filters{
padding:15px;
background:white;
display:flex;
gap:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.card h3{
text-align:center;
margin:10px 0 5px;
font-size:0.9rem;
}

.card p{
text-align:center;
color:grey;
font-size:0.8rem;
margin-bottom:10px;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.silhouette{
filter:brightness(0);
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

td,th{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.small-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.small-card{
background:white;
padding:15px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.small-card:hover{
transform:scale(1.05);
}

.guess-box{
text-align:center;
padding:20px;
}

.guess-box img{
width:200px;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:8px 15px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1 class="title">Silhouettes & Stats</h1>

<nav class="tabs">
<button class="tab active" data-tab="characters">Characters</button>
<button class="tab" data-tab="episodes">Episodes</button>
<button class="tab" data-tab="locations">Locations</button>
<button class="tab" data-tab="guess">Guess Character</button>
</nav>

<div class="tab-content active" id="characters">

<div class="filters">
<select id="statusFilter">
<option value="">All</option>
<option value="alive">Alive</option>
<option value="dead">Dead</option>
<option value="unknown">Unknown</option>
</select>
</div>

<div class="grid" id="charGrid"></div>

<div style="text-align:center">
<button id="prevBtn">< Prev</button>
<button id="nextBtn">Next ></button>
</div>

</div>

<div class="tab-content" id="episodes">
<h2 style="text-align:center">Episodes</h2>
<table id="episodeTable"></table>
</div>

<div class="tab-content" id="locations">
<h2 style="text-align:center">Locations</h2>
<div class="small-grid" id="locationGrid"></div>
</div>

<div class="tab-content" id="guess">
<h2 style="text-align:center">Guess Character</h2>

<div class="guess-box">
<img id="silhouette" src="">
<br>
<input id="guessInput" placeholder="Enter character name">
<br>
<button onclick="checkGuess()">Guess</button>
<p id="result"></p>
<p id="score">Score: 0</p>
<button onclick="nextCharacter()">Next</button>
</div>

</div>

<script>
let nextPage=null;
let prevPage=null;

let score = localStorage.getItem("score") || 0;
document.getElementById("score").innerText="Score: "+score;

document.querySelectorAll('.tab').forEach(tab=>{
tab.onclick=()=>{

document.querySelector('.tab.active').classList.remove('active');
tab.classList.add('active');

document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));

let tabName=tab.dataset.tab;
document.getElementById(tabName).classList.add('active');

if(tabName==="episodes") fetchEpisodes();
if(tabName==="locations") fetchLocations();
if(tabName==="guess") nextCharacter();
}
});

async function fetchCharacters(url="https://rickandmortyapi.com/api/character"){
let res=await fetch(url);
let data=await res.json();

nextPage=data.info.next;
prevPage=data.info.prev;

let grid=document.getElementById("charGrid");
grid.innerHTML="";

data.results.forEach(c=>{
grid.innerHTML+=`
<div class="card">
<img src="${c.image}">
<h3>${c.name}</h3>
<p>${c.species} - ${c.gender}</p>
</div>
`;
});
}

document.getElementById("nextBtn").onclick=()=>fetchCharacters(nextPage);
document.getElementById("prevBtn").onclick=()=>fetchCharacters(prevPage);

async function fetchEpisodes(){
let res=await fetch("https://rickandmortyapi.com/api/episode");
let data=await res.json();

let table=document.getElementById("episodeTable");
table.innerHTML=`
<tr><th>Episode</th><th>Name</th><th>Air Date</th></tr>
`;

data.results.forEach(e=>{
table.innerHTML+=`
<tr>
<td>${e.episode}</td>
<td>${e.name}</td>
<td>${e.air_date}</td>
</tr>
`;
});
}

async function fetchLocations(){
let res=await fetch("https://rickandmortyapi.com/api/location");
let data=await res.json();

let grid=document.getElementById("locationGrid");
grid.innerHTML="";

data.results.forEach(l=>{
grid.innerHTML+=`
<div class="small-card">
<h3>${l.name}</h3>
<p>${l.type}</p>
<p>${l.dimension}</p>
</div>
`;
});
}

let currentCharacter=null;

async function nextCharacter(){
let id=Math.floor(Math.random()*826)+1;
let res=await fetch(`https://rickandmortyapi.com/api/character/${id}`);
currentCharacter=await res.json();

let img=document.getElementById("silhouette");
img.src=currentCharacter.image;
img.classList.add("silhouette");

document.getElementById("result").innerText="";
document.getElementById("guessInput").value="";
}

function checkGuess(){
let input=document.getElementById("guessInput").value.toLowerCase();

if(input===currentCharacter.name.toLowerCase()){
document.getElementById("result").innerText="Correct!";
document.getElementById("silhouette").classList.remove("silhouette");

score++;
localStorage.setItem("score",score);
document.getElementById("score").innerText="Score: "+score;
}else{
document.getElementById("result").innerText="Wrong! Try again";
}
}

fetchCharacters();
fetchEpisodes();
fetchLocations();
nextCharacter();
</script>

</body>
</html>
