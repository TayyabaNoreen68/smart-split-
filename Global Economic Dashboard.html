<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Economic Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
min-height:100vh;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.info{
font-size:14px;
color:#ddd;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

select,input,button{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

select,input{
background:rgba(255,255,255,0.9);
color:#333;
}

button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
}

.error{
color:#ff6b6b;
text-align:center;
}

.loader{
text-align:center;
display:none;
}

canvas{
margin-top:20px;
background:white;
border-radius:15px;
padding:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:rgba(255,255,255,0.95);
color:#333;
}

th{
background:#0072ff;
color:white;
}

th,td{
padding:10px;
text-align:center;
}

.compare-box{
display:none;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Global Economic Dashboard</h1>

<div class="top-bar">
<div class="info">Click button to select multiple countries for comparison</div>
<button onclick="toggleCompare()">Select Countries</button>
</div>

<div class="glass">

<div class="controls">

<select id="indicator">
<option value="NY.GDP.MKTP.CD">GDP</option>
<option value="SP.POP.TOTL">Population</option>
<option value="FP.CPI.TOTL.ZG">Inflation</option>
<option value="SL.UEM.TOTL.ZS">Unemployment</option>
</select>

<input type="number" id="fromYear" value="2020">
<input type="number" id="toYear" value="2025">

<button onclick="fetchData()">Fetch Data</button>

</div>

<div class="compare-box" id="compareBox">
<select id="countrySelect" multiple size="8" style="width:100%"></select>
</div>

</div>

<div class="error" id="error"></div>
<div class="loader" id="loader">Loading...</div>

<canvas id="myChart"></canvas>
<table id="dataTable"></table>

</div>

<script>

let chart;

function toggleCompare(){
const box=document.getElementById("compareBox");
box.style.display=box.style.display==="block"?"none":"block";
}

async function loadCountries(){
const res=await fetch("https://api.worldbank.org/v2/country?format=json&per_page=300");
const data=await res.json();

const select=document.getElementById("countrySelect");

data[1]
.filter(c=>c.region.value!=="Aggregates")
.forEach(c=>{
const option=document.createElement("option");
option.value=c.id;
option.textContent=c.name;
select.appendChild(option);
});
}

loadCountries();

async function getCountryData(country,indicator,from,to){
const url=`https://api.worldbank.org/v2/country/${country}/indicator/${indicator}?date=${from}:${to}&format=json`;
const res=await fetch(url);
const data=await res.json();
if(!data[1]) return [];
return data[1].map(d=>({year:d.date,value:d.value})).reverse();
}

function formatValue(val){
if(val===null) return "No data";
return "$"+(val/1e9).toFixed(2)+"B";
}

async function fetchData(){

const select=document.getElementById("countrySelect");
const countries=[...select.selectedOptions].map(o=>o.value);

const indicator=document.getElementById("indicator").value;
const from=document.getElementById("fromYear").value;
const to=document.getElementById("toYear").value;

const error=document.getElementById("error");
const loader=document.getElementById("loader");

error.innerText="";
document.getElementById("dataTable").innerHTML="";

if(parseInt(from)>parseInt(to)){
error.innerText="Start year must be <= end year";
return;
}

if(countries.length===0){
error.innerText="Please select at least one country";
return;
}

loader.style.display="block";

try{

let labels=[];
const datasets=[];

for(let c of countries){

const data=await getCountryData(c,indicator,from,to);

if(labels.length===0){
labels=data.map(d=>d.year);
}

datasets.push({
label:c,
data:data.map(d=>d.value),
borderWidth:3,
tension:0.3
});
}

if(chart) chart.destroy();

const ctx=document.getElementById("myChart").getContext("2d");

chart=new Chart(ctx,{
type:"line",
data:{labels,datasets}
});

let html="<tr><th>Year</th>";
countries.forEach(c=>html+=`<th>${c}</th>`);
html+="</tr>";

for(let i=0;i<labels.length;i++){
html+="<tr><td>"+labels[i]+"</td>";
datasets.forEach(ds=>{
html+="<td>"+formatValue(ds.data[i])+"</td>";
});
html+="</tr>";
}

document.getElementById("dataTable").innerHTML=html;

}catch(e){
error.innerText="Failed to fetch data";
}

loader.style.display="none";
}

</script>

</body>
</html>
